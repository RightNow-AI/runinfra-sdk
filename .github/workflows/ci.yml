name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript SDK (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22, 24]

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c credential.helper= fetch --no-tags --prune --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify workflow policy
        run: node scripts/verify-workflow-policy.mjs

      - name: Verify version sync
        run: node scripts/verify-version-sync.mjs

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        run: |
          npm install --global pnpm@10.30.3 --ignore-scripts --no-audit --no-fund
          pnpm --version

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install Python build + test tools
        run: python -m pip install -r python/requirements-dev.txt

      - name: Install dependencies
        working-directory: typescript
        run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: typescript
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Build
        working-directory: typescript
        run: pnpm build

      - name: Test
        working-directory: typescript
        run: pnpm test

      - name: Pack (sanity check)
        working-directory: typescript
        run: |
          pnpm pack
          node ../scripts/verify-npm-package.mjs runinfra-sdk-*.tgz
          node ../scripts/verify-clean-installs.mjs --package typescript --mode artifact

  typescript-required:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    needs: [typescript]
    if: always()
    steps:
      - name: Require TypeScript matrix
        run: |
          if [ "${{ needs.typescript.result }}" != "success" ]; then
            echo "TypeScript matrix result: ${{ needs.typescript.result }}"
            exit 1
          fi

  python:
    name: Python SDK (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c credential.helper= fetch --no-tags --prune --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build + test tools
        run: python -m pip install -r python/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0

      - name: Build sdist + wheel
        working-directory: python
        run: python -m build

      - name: Verify wheel contents
        working-directory: python
        run: |
          ls -la dist/
          # Verify wheel + sdist exist
          test -n "$(ls dist/runinfra-*.whl 2>/dev/null)" || (echo 'no wheel' && exit 1)
          test -n "$(ls dist/runinfra-*.tar.gz 2>/dev/null)" || (echo 'no sdist' && exit 1)
          python ../scripts/verify-python-package.py dist
          # twine-check (PyPI metadata sanity)
          twine check dist/*
          node ../scripts/verify-clean-installs.mjs --package python --mode artifact

      - name: Test
        working-directory: python
        run: |
          python -m pip install -e .
          python -m pytest tests/ -v

  python-required:
    name: Python SDK
    runs-on: ubuntu-latest
    needs: [python]
    if: always()
    steps:
      - name: Require Python matrix
        run: |
          if [ "${{ needs.python.result }}" != "success" ]; then
            echo "Python matrix result: ${{ needs.python.result }}"
            exit 1
          fi
