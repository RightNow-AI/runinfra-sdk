name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        working-directory: typescript
        run: pnpm install --lockfile=false

      - name: Type-check
        working-directory: typescript
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Build
        working-directory: typescript
        run: pnpm build

      - name: Test
        working-directory: typescript
        run: pnpm test

      - name: Pack (sanity check)
        working-directory: typescript
        run: |
          pnpm pack
          tar -tf runinfra-sdk-*.tgz
          # Verify only the whitelisted files are present
          tar -tf runinfra-sdk-*.tgz | grep -qE '(package/dist/|package/README.md|package/CHANGELOG.md|package/LICENSE|package/package.json)' || (echo 'Unexpected files in tarball!' && exit 1)
          # Verify nothing dangerous
          if tar -tf runinfra-sdk-*.tgz | grep -qE '\.(map|env|test\.ts)$'; then
            echo 'FAIL: sourcemap/.env/test files in tarball!'
            exit 1
          fi

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build + test tools
        run: python -m pip install --upgrade build pytest twine

      - name: Build sdist + wheel
        working-directory: python
        run: python -m build

      - name: Verify wheel contents
        working-directory: python
        run: |
          ls -la dist/
          # Verify wheel + sdist exist
          test -n "$(ls dist/runinfra-*.whl 2>/dev/null)" || (echo 'no wheel' && exit 1)
          test -n "$(ls dist/runinfra-*.tar.gz 2>/dev/null)" || (echo 'no sdist' && exit 1)
          # Show contents
          python -m zipfile -l dist/runinfra-*.whl
          # No sourcemaps, no env files
          if python -m zipfile -l dist/runinfra-*.whl | grep -qE '\.(map|env|pyc)$'; then
            echo 'FAIL: sourcemap/.env/.pyc files in wheel!'
            exit 1
          fi
          # twine-check (PyPI metadata sanity)
          twine check dist/*

      - name: Test
        working-directory: python
        run: |
          python -m pip install -e .
          python -m pytest tests/ -v
