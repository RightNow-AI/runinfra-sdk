name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Verify workflow policy
        run: node scripts/verify-workflow-policy.mjs

      - name: Verify version sync
        run: node scripts/verify-version-sync.mjs

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        working-directory: typescript
        run: pnpm install --lockfile=false

      - name: Type-check
        working-directory: typescript
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Build
        working-directory: typescript
        run: pnpm build

      - name: Test
        working-directory: typescript
        run: pnpm test

      - name: Pack (sanity check)
        working-directory: typescript
        run: |
          pnpm pack
          node ../scripts/verify-npm-package.mjs runinfra-sdk-*.tgz

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build + test tools
        run: python -m pip install --upgrade build pytest twine

      - name: Build sdist + wheel
        working-directory: python
        run: python -m build

      - name: Verify wheel contents
        working-directory: python
        run: |
          ls -la dist/
          # Verify wheel + sdist exist
          test -n "$(ls dist/runinfra-*.whl 2>/dev/null)" || (echo 'no wheel' && exit 1)
          test -n "$(ls dist/runinfra-*.tar.gz 2>/dev/null)" || (echo 'no sdist' && exit 1)
          python ../scripts/verify-python-package.py dist
          # twine-check (PyPI metadata sanity)
          twine check dist/*

      - name: Test
        working-directory: python
        run: |
          python -m pip install -e .
          python -m pytest tests/ -v
