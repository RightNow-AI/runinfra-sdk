name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: Which package to publish
        required: true
        type: choice
        options:
          - both
          - typescript
          - python
        default: both
      dry_run:
        description: Build and verify without publishing
        required: false
        type: boolean
        default: true
      confirm_version:
        description: Required for real publish. Must match the SDK version, for example 0.1.4.
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: runinfra-sdk-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-artifacts:
    name: Build Promotion Artifacts
    if: ${{ github.ref == 'refs/heads/main' && (github.event.inputs.package == 'typescript' || github.event.inputs.package == 'python' || github.event.inputs.package == 'both') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c credential.helper= fetch --no-tags --prune --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify version sync
        run: node scripts/verify-version-sync.mjs

      - name: Verify publish dispatch
        run: node scripts/verify-publish-dispatch.mjs
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_CONFIRM_VERSION: ${{ github.event.inputs.confirm_version }}

      - name: Setup Node
        # Note: do NOT set `registry-url` here. It creates an .npmrc with
        # a token placeholder, which makes the CLI demand token auth
        # instead of using OIDC. The publish step sets the registry inline.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0

      - name: Setup pnpm
        run: |
          npm install --global pnpm@10.30.3 --ignore-scripts --no-audit --no-fund
          pnpm --version

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install Python build + test tools
        run: python -m pip install -r python/requirements-dev.txt

      - name: Install TypeScript dependencies
        working-directory: typescript
        run: pnpm install --frozen-lockfile

      - name: Type-check TypeScript
        working-directory: typescript
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Test TypeScript
        working-directory: typescript
        run: pnpm test

      - name: Build TypeScript
        working-directory: typescript
        run: pnpm build

      - name: Pack npm artifact
        working-directory: typescript
        run: |
          mkdir -p ../artifacts/npm-local
          pnpm pack --pack-destination ../artifacts/npm-local

      - name: Verify npm artifact contents (no leaks)
        run: |
          TGZ=$(ls artifacts/npm-local/runinfra-sdk-*.tgz)
          echo "=== Tarball: $TGZ ==="
          node scripts/verify-npm-package.mjs "$TGZ"

      - name: Test Python
        run: |
          python -m pip install -e python
          python -m pytest python/tests/ -v

      - name: Build Python artifacts
        run: python -m build python --outdir artifacts/python-local

      - name: Verify Python artifacts (no leaks)
        run: |
          ls -la artifacts/python-local/
          test -n "$(ls artifacts/python-local/runinfra-*.whl 2>/dev/null)" || (echo 'no wheel' && exit 1)
          test -n "$(ls artifacts/python-local/runinfra-*.tar.gz 2>/dev/null)" || (echo 'no sdist' && exit 1)
          python scripts/verify-python-package.py artifacts/python-local
          twine check artifacts/python-local/*

      - name: Verify clean artifact install/import
        run: |
          node scripts/verify-clean-installs.mjs \
            --package both \
            --mode artifact \
            --npm-tarball artifacts/npm-local/runinfra-sdk-*.tgz \
            --python-wheel artifacts/python-local/runinfra-*-py3-none-any.whl \
            --python-sdist artifacts/python-local/runinfra-*.tar.gz

      - name: Upload exact promoted package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runinfra-sdk-promoted-artifacts
          path: |
            artifacts/npm-local/runinfra-sdk-*.tgz
            artifacts/python-local/runinfra-*.whl
            artifacts/python-local/runinfra-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  promotion-gate:
    name: Strict Promotion Gate
    if: ${{ github.ref == 'refs/heads/main' && (github.event.inputs.package == 'typescript' || github.event.inputs.package == 'python' || github.event.inputs.package == 'both') }}
    needs: build-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: read
    env:
      RUNINFRA_API_KEY: ${{ secrets.RUNINFRA_API_KEY }}
      RUNINFRA_BASE_URL: ${{ vars.RUNINFRA_BASE_URL }}
      RUNINFRA_CANARY_TIMEOUT_SECONDS: ${{ vars.RUNINFRA_CANARY_TIMEOUT_SECONDS }}
      RUNINFRA_CANARY_STREAM_SLOW_CONSUMER_DELAY_MS: ${{ vars.RUNINFRA_CANARY_STREAM_SLOW_CONSUMER_DELAY_MS }}
      RUNINFRA_LLM_MODEL: ${{ vars.RUNINFRA_LLM_MODEL }}
      RUNINFRA_EMBEDDING_MODEL: ${{ vars.RUNINFRA_EMBEDDING_MODEL }}
      RUNINFRA_EMBEDDING_DIMENSIONS: ${{ vars.RUNINFRA_EMBEDDING_DIMENSIONS }}
      RUNINFRA_IMAGE_MODEL: ${{ vars.RUNINFRA_IMAGE_MODEL }}
      RUNINFRA_IMAGE_SIZE: ${{ vars.RUNINFRA_IMAGE_SIZE }}
      RUNINFRA_IMAGE_RESPONSE_FORMAT: ${{ vars.RUNINFRA_IMAGE_RESPONSE_FORMAT }}
      RUNINFRA_TTS_MODEL: ${{ vars.RUNINFRA_TTS_MODEL }}
      RUNINFRA_TTS_VOICE: ${{ vars.RUNINFRA_TTS_VOICE }}
      RUNINFRA_TTS_REF_AUDIO: ${{ secrets.RUNINFRA_TTS_REF_AUDIO }}
      RUNINFRA_TTS_REF_TEXT: ${{ secrets.RUNINFRA_TTS_REF_TEXT }}
      RUNINFRA_TTS_TASK_TYPE: ${{ vars.RUNINFRA_TTS_TASK_TYPE }}
      RUNINFRA_TTS_RESPONSE_FORMAT: ${{ vars.RUNINFRA_TTS_RESPONSE_FORMAT }}
      RUNINFRA_ASR_MODEL: ${{ vars.RUNINFRA_ASR_MODEL }}
      RUNINFRA_ASR_LANGUAGE: ${{ vars.RUNINFRA_ASR_LANGUAGE }}
      RUNINFRA_ASR_RESPONSE_FORMAT: ${{ vars.RUNINFRA_ASR_RESPONSE_FORMAT }}
      RUNINFRA_ASR_FIXTURE_BASE64: ${{ secrets.RUNINFRA_ASR_FIXTURE_BASE64 }}
      RUNINFRA_ASR_FIXTURE_CONTENT_TYPE: ${{ vars.RUNINFRA_ASR_FIXTURE_CONTENT_TYPE }}
      RUNINFRA_ASR_EXPECTED_TEXT: ${{ secrets.RUNINFRA_ASR_EXPECTED_TEXT }}
      RUNINFRA_PIPELINE_API_KEY: ${{ secrets.RUNINFRA_PIPELINE_API_KEY }}
      RUNINFRA_VOICE_PIPELINE_ID: ${{ vars.RUNINFRA_VOICE_PIPELINE_ID }}
      RUNINFRA_VOICE_PIPELINE_API_KEY: ${{ secrets.RUNINFRA_VOICE_PIPELINE_API_KEY }}
      RUNINFRA_VOICE_PIPELINE_AUDIO_BASE64: ${{ secrets.RUNINFRA_VOICE_PIPELINE_AUDIO_BASE64 }}
      RUNINFRA_VOICE_PIPELINE_AUDIO_CONTENT_TYPE: ${{ vars.RUNINFRA_VOICE_PIPELINE_AUDIO_CONTENT_TYPE }}
      RUNINFRA_VOICE_PIPELINE_EXPECTED_TEXT: ${{ secrets.RUNINFRA_VOICE_PIPELINE_EXPECTED_TEXT }}
      RUNINFRA_CANARY_ENABLE_IDEMPOTENCY: ${{ vars.RUNINFRA_CANARY_ENABLE_IDEMPOTENCY }}
      RUNINFRA_CANARY_IDEMPOTENCY_EVIDENCE_FIELD: ${{ vars.RUNINFRA_CANARY_IDEMPOTENCY_EVIDENCE_FIELD }}

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c credential.helper= fetch --no-tags --prune --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Download exact promoted package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runinfra-sdk-promoted-artifacts
          path: artifacts

      - name: Verify promoted artifact download layout
        run: node scripts/verify-promoted-artifacts.mjs artifacts

      - name: Prepare exact artifacts and canary fixtures
        run: |
          mkdir -p typescript python/dist artifacts/sdk
          cp artifacts/npm-local/runinfra-sdk-*.tgz typescript/
          cp artifacts/python-local/runinfra-*-py3-none-any.whl python/dist/
          cp artifacts/python-local/runinfra-*.tar.gz python/dist/
          if [ -n "${RUNINFRA_ASR_FIXTURE_BASE64:-}" ]; then
            printf '%s' "$RUNINFRA_ASR_FIXTURE_BASE64" | base64 -d > artifacts/sdk/asr-fixture.wav
            echo "RUNINFRA_ASR_FIXTURE_PATH=$PWD/artifacts/sdk/asr-fixture.wav" >> "$GITHUB_ENV"
          fi
          if [ -n "${RUNINFRA_VOICE_PIPELINE_AUDIO_BASE64:-}" ]; then
            printf '%s' "$RUNINFRA_VOICE_PIPELINE_AUDIO_BASE64" | base64 -d > artifacts/sdk/voice-pipeline-fixture.wav
            echo "RUNINFRA_VOICE_PIPELINE_AUDIO_PATH=$PWD/artifacts/sdk/voice-pipeline-fixture.wav" >> "$GITHUB_ENV"
          fi

      - name: Verify GitHub code scanning status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/verify-github-security-status.mjs --repo RightNow-AI/runinfra-sdk

      - name: Dry-run promotion gate summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run - strict live promotion reports are required before a real publish."

      - name: Strict live-canary readiness preflight
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/run-sdk-live-canaries.mjs --preflight --strict --report artifacts/sdk/live-canary-readiness.json

      - name: Strict artifact live canary
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/run-sdk-live-canaries.mjs --package-source artifact --strict --report artifacts/sdk/live-canary.json

      - name: Verify strict promotion reports
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/verify-promotion-reports.mjs --readiness artifacts/sdk/live-canary-readiness.json --live artifacts/sdk/live-canary.json --artifacts-root .

  dry-run-npm:
    name: Dry-run TypeScript SDK
    if: ${{ github.ref == 'refs/heads/main' && github.event.inputs.dry_run == 'true' && (github.event.inputs.package == 'typescript' || github.event.inputs.package == 'both') }}
    needs: [build-artifacts, promotion-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c credential.helper= fetch --no-tags --prune --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify version sync
        run: node scripts/verify-version-sync.mjs

      - name: Verify publish dispatch
        run: node scripts/verify-publish-dispatch.mjs
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_CONFIRM_VERSION: ${{ github.event.inputs.confirm_version }}

      - name: Setup Node
        # Note: do NOT set `registry-url` here. It creates an .npmrc with
        # a token placeholder, which makes the CLI demand token auth
        # instead of using OIDC. The publish step sets the registry inline.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0

      - name: Download exact promoted package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runinfra-sdk-promoted-artifacts
          path: artifacts

      - name: Verify promoted artifact download layout
        run: node scripts/verify-promoted-artifacts.mjs artifacts

      - name: Verify exact npm artifact contents (no leaks)
        run: |
          TGZ=$(ls artifacts/npm-local/runinfra-sdk-*.tgz)
          echo "=== Tarball: $TGZ ==="
          node scripts/verify-npm-package.mjs "$TGZ"

      - name: Verify clean npm install/import
        run: node scripts/verify-clean-installs.mjs --package typescript --mode artifact --npm-tarball artifacts/npm-local/runinfra-sdk-*.tgz

      - name: Dry-run summary
        run: |
          echo 'Dry run - would have published:'
          ls -la artifacts/npm-local/runinfra-sdk-*.tgz

  dry-run-pypi:
    name: Dry-run Python SDK
    if: ${{ github.ref == 'refs/heads/main' && github.event.inputs.dry_run == 'true' && (github.event.inputs.package == 'python' || github.event.inputs.package == 'both') }}
    needs: [build-artifacts, promotion-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c credential.helper= fetch --no-tags --prune --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify version sync
        run: node scripts/verify-version-sync.mjs

      - name: Verify publish dispatch
        run: node scripts/verify-publish-dispatch.mjs
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_CONFIRM_VERSION: ${{ github.event.inputs.confirm_version }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0

      - name: Download exact promoted package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runinfra-sdk-promoted-artifacts
          path: artifacts

      - name: Verify promoted artifact download layout
        run: node scripts/verify-promoted-artifacts.mjs artifacts

      - name: Verify exact Python artifacts (no leaks)
        run: |
          python -m pip install -r python/requirements-dev.txt
          ls -la artifacts/python-local/
          test -n "$(ls artifacts/python-local/runinfra-*.whl 2>/dev/null)" || (echo 'no wheel' && exit 1)
          test -n "$(ls artifacts/python-local/runinfra-*.tar.gz 2>/dev/null)" || (echo 'no sdist' && exit 1)
          python scripts/verify-python-package.py artifacts/python-local
          twine check artifacts/python-local/*
          node scripts/verify-clean-installs.mjs --package python --mode artifact --python-wheel artifacts/python-local/runinfra-*-py3-none-any.whl --python-sdist artifacts/python-local/runinfra-*.tar.gz

      - name: Dry-run summary
        run: |
          echo 'Dry run - would have published:'
          ls -la artifacts/python-local/

  publish-npm:
    name: Publish TypeScript SDK
    if: ${{ github.ref == 'refs/heads/main' && github.event.inputs.dry_run != 'true' && (github.event.inputs.package == 'typescript' || github.event.inputs.package == 'both') }}
    needs: [build-artifacts, promotion-gate]
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c credential.helper= fetch --no-tags --prune --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify version sync
        run: node scripts/verify-version-sync.mjs

      - name: Verify publish dispatch
        run: node scripts/verify-publish-dispatch.mjs
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_CONFIRM_VERSION: ${{ github.event.inputs.confirm_version }}

      - name: Setup Node
        # Note: do NOT set `registry-url` here. It creates an .npmrc with
        # a token placeholder, which makes the CLI demand token auth
        # instead of using OIDC. The publish step sets the registry inline.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0

      - name: Download exact promoted package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runinfra-sdk-promoted-artifacts
          path: artifacts

      - name: Verify promoted artifact download layout
        run: node scripts/verify-promoted-artifacts.mjs artifacts

      - name: Verify exact npm artifact contents (no leaks)
        run: |
          TGZ=$(ls artifacts/npm-local/runinfra-sdk-*.tgz)
          echo "=== Tarball: $TGZ ==="
          node scripts/verify-npm-package.mjs "$TGZ"

      - name: Verify clean npm install/import
        run: node scripts/verify-clean-installs.mjs --package typescript --mode artifact --npm-tarball artifacts/npm-local/runinfra-sdk-*.tgz

      - name: Install npm trusted publishing CLI
        run: |
          npm install -g npm@11.5.1
          npm --version

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          # npm 11.5.1+ with id-token: write permission performs OIDC trusted
          # publishing automatically when --provenance is used and no other
          # auth is configured.
          npm config set registry https://registry.npmjs.org/
          npm publish artifacts/npm-local/runinfra-sdk-*.tgz --access public --provenance

      - name: Verify published npm install/import
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/verify-clean-installs.mjs --package typescript --mode registry

  publish-pypi:
    name: Publish Python SDK
    if: ${{ github.ref == 'refs/heads/main' && github.event.inputs.dry_run != 'true' && (github.event.inputs.package == 'python' || github.event.inputs.package == 'both') }}
    needs: [build-artifacts, promotion-gate]
    runs-on: ubuntu-latest
    environment: pypi
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c credential.helper= fetch --no-tags --prune --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify version sync
        run: node scripts/verify-version-sync.mjs

      - name: Verify publish dispatch
        run: node scripts/verify-publish-dispatch.mjs
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_CONFIRM_VERSION: ${{ github.event.inputs.confirm_version }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0

      - name: Download exact promoted package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: runinfra-sdk-promoted-artifacts
          path: artifacts

      - name: Verify promoted artifact download layout
        run: node scripts/verify-promoted-artifacts.mjs artifacts

      - name: Verify exact Python artifacts (no leaks)
        run: |
          python -m pip install -r python/requirements-dev.txt
          ls -la artifacts/python-local/
          test -n "$(ls artifacts/python-local/runinfra-*.whl 2>/dev/null)" || (echo 'no wheel' && exit 1)
          test -n "$(ls artifacts/python-local/runinfra-*.tar.gz 2>/dev/null)" || (echo 'no sdist' && exit 1)
          python scripts/verify-python-package.py artifacts/python-local
          twine check artifacts/python-local/*
          node scripts/verify-clean-installs.mjs --package python --mode artifact --python-wheel artifacts/python-local/runinfra-*-py3-none-any.whl --python-sdist artifacts/python-local/runinfra-*.tar.gz

      - name: Publish to PyPI
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: artifacts/python-local

      - name: Verify published PyPI install/import
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/verify-clean-installs.mjs --package python --mode registry
